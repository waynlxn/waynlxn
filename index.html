<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ASCII Chess</title>
<style>
  body {
    font-family: monospace;
  }
  #chessboard {
    cursor: pointer;
    line-height: 1.2;
  }
</style>
</head>
<body>
<pre id="chessboard"></pre>
<script>
const initialBoard = [
  ['r','n','b','q','k','b','n','r'],
  ['p','p','p','p','p','p','p','p'],
  ['.','.','.','.','.','.','.','.'],
  ['.','.','.','.','.','.','.','.'],
  ['.','.','.','.','.','.','.','.'],
  ['.','.','.','.','.','.','.','.'],
  ['P','P','P','P','P','P','P','P'],
  ['R','N','B','Q','K','B','N','R']
];

let board = initialBoard.map(row => row.slice());
let selected = null;

// Function to render the board
function renderBoard() {
  let display = '';
  for (let row = 0; row < 8; row++) {
    display += (8 - row) + ' ';
    for (let col = 0; col < 8; col++) {
      const piece = board[row][col];
      // mark selected piece
      if (selected && selected[0] === row && selected[1] === col) {
        display += `[${piece}]`;
      } else {
        display += ' ' + piece + ' ';
      }
    }
    display += '\n';
  }
  display += '  a  b  c  d  e  f  g  h\n';
  document.getElementById('chessboard').textContent = display;
}

// Function to convert click position to board coordinates
function getCoordsFromEvent(e) {
  const rect = e.target.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const lineHeight = 20; // approximate line height
  const charWidth = 10; // approximate char width
  const row = Math.floor(y / lineHeight);
  const col = Math.floor(x / charWidth);
  if (row >= 0 && row < 8 && col >= 0 && col < 8) {
    return [row, col];
  }
  return null;
}

document.getElementById('chessboard').addEventListener('click', (e) => {
  // Get click position relative to text
  const rect = e.target.getBoundingClientRect();
  const y = e.clientY - rect.top;
  const x = e.clientX - rect.left;
  const lineHeight = 20; // same as above
  const charWidth = 10; // same as above
  const row = Math.floor(y / lineHeight);
  const col = Math.floor(x / charWidth);
  if (row >= 0 && row < 8 && col >= 0 && col < 8) {
    if (!selected) {
      // select a piece
      selected = [row, col];
    } else {
      // move piece
      const [sr, sc] = selected;
      // simple move: allow move if destination is empty or opponent's piece
      board[row][col] = board[sr][sc];
      board[sr][sc] = '.';
      selected = null;
    }
    renderBoard();
  }
});

renderBoard();
</script>
</body>
</html>
