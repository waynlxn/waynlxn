<!DOCTYPE html>
<html lang="en" x-data="{ playing: false }">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adam</title>

<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

body{
    position:relative;
}

.bg{
    position:fixed;
    inset:0;
    background:url("adam.png") center center/cover no-repeat;
}

.overlay{
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
        radial-gradient(circle at center,
            transparent 45%,
            rgba(140,0,0,.35) 70%,
            rgba(0,0,0,.9) 100%);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
}

.vignette{
    position:fixed;
    inset:-80px;
    pointer-events:none;
    box-shadow:
        inset 0 0 200px rgba(0,0,0,.95),
        inset 0 0 140px rgba(255,0,0,.35);
    filter:blur(35px);
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>
<div class="vignette"></div>

<audio id="bgm" src="adam.mp3" autoplay loop></audio>

<script>
const audio = document.getElementById("bgm");
audio.volume = 0.6;

const playAudio = () => {
    audio.play().catch(() => {});
};

playAudio();

document.addEventListener("click", playAudio, { once: true });
document.addEventListener("touchstart", playAudio, { once: true });
document.addEventListener("keydown", playAudio, { once: true });

document.addEventListener("visibilitychange", () => {
    if (!document.hidden) playAudio();
});
</script>

</body>
</html>
